service: interviewpilot-backend

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.10
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 30
  environment:
    # IMPORTANT: We assume the following env vars are passed in from GitHub Actions secrets
    MONGODB_URL: ${env:MONGODB_URL, ''}
    JWT_SECRET: ${env:JWT_SECRET, ''}
    BACKEND_CORS_ORIGINS: '["*"]' # Allow all for lambda staging initially

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: false # Assuming GitHub Actions runner has python environment setup

functions:
  api:
    handler: main.handler
    events:
      - httpApi:
          path: '/{proxy+}'
          method: '*'
      - httpApi:
          path: '/'
          method: '*'

package:
  patterns:
    - '!venv/**'
    - '!.pytest_cache/**'
    - '!__pycache__/**'
    - '!*.md'
